        repository: updated-bbl-state
      put: bbl-state
    file: cf-deployment-concourse-tasks/bbl-destroy/task.yml
    input_mapping:
      bbl-state: bbl-state
    params:
      BBL_AWS_ACCESS_KEY_ID: ((.:base-infra.bbl_aws_creds.aws_access_key_id))
      BBL_AWS_REGION: ((region))
      BBL_AWS_SECRET_ACCESS_KEY: ((.:base-infra.bbl_aws_creds.aws_secret_access_key))
      BBL_STATE_DIR: perf-tests/bbl-state
      TF_VAR_elb_idle_timeout: ((cf_router_idle_timeout_secs))
    task: bbl-destroy
  serial: true
  serial_groups:
  - deploy-test-destroy
- name: manual-teardown-base-infra-only
  plan:
  - get: cf-performance-tests-pipeline
  - attempts: 3
    get_params:
      action: destroy
    params:
      action: destroy
      terraform_source: cf-performance-tests-pipeline/base-infra/terraform
    put: base-infra
  serial: true
  serial_groups:
  - deploy-test-destroy
- name: manual-teardown-all
  plan:
  - in_parallel:
    - get: cf-performance-tests-pipeline
    - get: cf-deployment-concourse-tasks
    - get: bbl-state
    - get: base-infra
  - file: base-infra/metadata
    format: json
    load_var: base-infra
  - do:
    - attempts: 3
      file: cf-deployment-concourse-tasks/bosh-delete-deployment/task.yml
      params:
        BBL_STATE_DIR: perf-tests/bbl-state
        DELETE_ALL_DEPLOYMENTS: true
        IGNORE_ERRORS: true
      task: bosh-delete-deployments
    - do:
      - ensure:
          attempts: 3
          params:
            rebase: true
            repository: updated-bbl-state
          put: bbl-state
        file: cf-deployment-concourse-tasks/bbl-destroy/task.yml
        input_mapping:
          bbl-state: bbl-state
        params:
          BBL_AWS_ACCESS_KEY_ID: ((.:base-infra.bbl_aws_creds.aws_access_key_id))
          BBL_AWS_REGION: ((region))
          BBL_AWS_SECRET_ACCESS_KEY: ((.:base-infra.bbl_aws_creds.aws_secret_access_key))
          BBL_STATE_DIR: perf-tests/bbl-state
          TF_VAR_elb_idle_timeout: ((cf_router_idle_timeout_secs))
        task: bbl-destroy
      - attempts: 3
        get_params:
          action: destroy
        params:
          action: destroy
          terraform_source: cf-performance-tests-pipeline/base-infra/terraform
        put: base-infra
  serial: true
  serial_groups:
  - deploy-test-destroy
- name: set-next-pipeline
  plan:
  - in_parallel:
    - get: cf-performance-tests-pipeline
      passed:
      - teardown
      trigger: true
    - get: cf-deployment
      passed:
      - teardown
      trigger: true
    - get: concourse-tasks
  - try:
      do:
      - file: concourse-tasks/toggle/task.yml
        params:
          TOGGLE: ((more_tests))
        task: toggle
      - params:
          force: true
          repository: cf-performance-tests-pipeline
        put: cf-performance-tests-pipeline-target
      - file: cf-performance-tests-pipeline/ci/generated-backfill-pipeline.yml
        set_pipeline: perf-test-old-((next_test_name))
        var_files:
        - cf-performance-tests-pipeline/variables/common.yml
        - cf-performance-tests-pipeline/variables/cf-d-backfill/((next_test_name)).yml
  serial: true
resource_types:
- name: slack-alert
  source:
    repository: arbourd/concourse-slack-alert-resource
  type: registry-image
- name: terraform
  source:
    repository: ljfranklin/terraform-resource
    tag: latest
  type: registry-image
resources:
- icon: github
  name: cf-deployment-concourse-tasks
  source:
    uri: https://github.com/cloudfoundry/cf-deployment-concourse-tasks.git
  type: git
- icon: github
  name: capi-ci
  source:
    branch: main
    password: ((ari-wg-gitbot-token))
    uri: https://github.com/cloudfoundry/capi-ci.git
    username: ((ari-wg-gitbot-username))
  type: git
- icon: github
  name: cf-performance-tests-pipeline
  source:
    branch: ((cf_perf_tests_pipeline_source_branch))
    ignore_paths:
    - results/**
    password: ((ari-wg-gitbot-token))
    uri: https://github.com/cloudfoundry/cf-performance-tests-pipeline.git
    username: ((ari-wg-gitbot-username))
  type: git
- icon: github
  name: results
  source:
    branch: ((results-branch))
    password: ((ari-wg-gitbot-token))
    uri: https://github.com/cloudfoundry/cf-performance-tests-pipeline.git
    username: ((ari-wg-gitbot-username))
  type: git
- icon: git
  name: bbl-state
  source:
    branch: main
    password: ((ari-wg-gitbot-token))
    uri: https://github.com/cloudfoundry/capi-ci-private.git
    username: ((ari-wg-gitbot-username))
  type: git
- icon: github
  name: cf-deployment
  source:
    tag_filter: ((cf_deployment_tag_filter))
    uri: https://github.com/cloudfoundry/cf-deployment.git
  type: git
- name: slack-notification
  source:
    url: ((cf-perf-slack-notification-url))
  type: slack-alert
- icon: github
  name: concourse-tasks
  source:
    tag_regex: '[0-9]+\.[0-9]+\.[0-9]+'
    uri: https://github.com/EngineerBetter/concourse-tasks.git
  type: git
- icon: terraform
  name: base-infra
  source:
    backend_config:
      access_key: ((aws-pipeline-user-id))
      bucket: ((state-bucket-name))
      key: base-infra.tfstate
      region: ((region))
      secret_key: ((aws-pipeline-user-secret))
      workspace_key_prefix: ((cloud_controller_type))((test_suffix))
    backend_type: s3
    env:
      AWS_ACCESS_KEY_ID: ((aws-pipeline-user-id))
      AWS_DEFAULT_REGION: ((region))
      AWS_SECRET_ACCESS_KEY: ((aws-pipeline-user-secret))
    env_name: terraform
    vars:
      region: ((region))
      system_domain: cf.p-((cloud_controller_type))((test_suffix)).((parent_zone_domain))
      test_environment: ((cloud_controller_type))((test_suffix))
  type: terraform
- icon: github
  name: cf-performance-tests-pipeline-target
  source:
    branch: perf-test-old-((next_test_name))
    password: ((cf-perf-github-user-token))
    uri: https://github.com/cloudfoundry/cf-performance-tests-pipeline.git
    username: ((cf-perf-github-username))
  type: git
