anchors:
  alert_failure:
    on_failure:
      params:
        alert_type: failed
      put: slack-notification
  bbl_destroy:
    ensure:
      attempts: 3
      params:
        rebase: true
        repository: updated-bbl-state
      put: bbl-state
    file: cf-deployment-concourse-tasks/bbl-destroy/task.yml
    input_mapping:
      bbl-state: bbl-state
    params:
      BBL_AWS_ACCESS_KEY_ID: ((.:base-infra.bbl_aws_creds.aws_access_key_id))
      BBL_AWS_REGION: ((region))
      BBL_AWS_SECRET_ACCESS_KEY: ((.:base-infra.bbl_aws_creds.aws_secret_access_key))
      BBL_STATE_DIR: perf-tests/bbl-state
      TF_VAR_elb_idle_timeout: ((cf_router_idle_timeout_secs))
    task: bbl-destroy
  bbl_state_upload:
    attempts: 3
    params:
      rebase: true
      repository: updated-bbl-state
    put: bbl-state
  bbl_up:
    ensure:
      attempts: 3
      params:
        rebase: true
        repository: updated-bbl-state
      put: bbl-state
    file: cf-deployment-concourse-tasks/bbl-up/task.yml
    input_mapping:
      bbl-config: cf-performance-tests-pipeline
      bbl-state: bbl-state
    params:
      BBL_AWS_ACCESS_KEY_ID: ((.:base-infra.bbl_aws_creds.aws_access_key_id))
      BBL_AWS_REGION: ((region))
      BBL_AWS_SECRET_ACCESS_KEY: ((.:base-infra.bbl_aws_creds.aws_secret_access_key))
      BBL_CONFIG_DIR: bbl-patches
      BBL_ENV_NAME: perf-test-((cloud_controller_type))((test_suffix))
      BBL_IAAS: aws
      BBL_LB_CERT: ((.:base-infra.cert_pem))
      BBL_LB_KEY: ((.:base-infra.private_key))
      BBL_STATE_DIR: perf-tests/bbl-state
      LB_DOMAIN: cf.p-((cloud_controller_type))((test_suffix)).((parent_zone_domain))
      SKIP_LB_CREATION: false
      TF_VAR_elb_idle_timeout: ((cf_router_idle_timeout_secs))
    task: bbl-up
  delete_cf:
    attempts: 3
    file: cf-deployment-concourse-tasks/bosh-delete-deployment/task.yml
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
      DELETE_ALL_DEPLOYMENTS: true
      IGNORE_ERRORS: true
    task: bosh-delete-deployments
  destroy_all:
    do:
    - attempts: 3
      file: cf-deployment-concourse-tasks/bosh-delete-deployment/task.yml
      params:
        BBL_STATE_DIR: perf-tests/bbl-state
        DELETE_ALL_DEPLOYMENTS: true
        IGNORE_ERRORS: true
      task: bosh-delete-deployments
    - do:
      - ensure:
          attempts: 3
          params:
            rebase: true
            repository: updated-bbl-state
          put: bbl-state
        file: cf-deployment-concourse-tasks/bbl-destroy/task.yml
        input_mapping:
          bbl-state: bbl-state
        params:
          BBL_AWS_ACCESS_KEY_ID: ((.:base-infra.bbl_aws_creds.aws_access_key_id))
          BBL_AWS_REGION: ((region))
          BBL_AWS_SECRET_ACCESS_KEY: ((.:base-infra.bbl_aws_creds.aws_secret_access_key))
          BBL_STATE_DIR: perf-tests/bbl-state
          TF_VAR_elb_idle_timeout: ((cf_router_idle_timeout_secs))
        task: bbl-destroy
      - attempts: 3
        get_params:
          action: destroy
        params:
          action: destroy
          terraform_source: cf-performance-tests-pipeline/base-infra/terraform
        put: base-infra
  destroy_base_infra:
    attempts: 3
    get_params:
      action: destroy
    params:
      action: destroy
      terraform_source: cf-performance-tests-pipeline/base-infra/terraform
    put: base-infra
  destroy_director_and_base_infra:
    do:
    - ensure:
        attempts: 3
        params:
          rebase: true
          repository: updated-bbl-state
        put: bbl-state
      file: cf-deployment-concourse-tasks/bbl-destroy/task.yml
      input_mapping:
        bbl-state: bbl-state
      params:
        BBL_AWS_ACCESS_KEY_ID: ((.:base-infra.bbl_aws_creds.aws_access_key_id))
        BBL_AWS_REGION: ((region))
        BBL_AWS_SECRET_ACCESS_KEY: ((.:base-infra.bbl_aws_creds.aws_secret_access_key))
        BBL_STATE_DIR: perf-tests/bbl-state
        TF_VAR_elb_idle_timeout: ((cf_router_idle_timeout_secs))
      task: bbl-destroy
    - attempts: 3
      get_params:
        action: destroy
      params:
        action: destroy
        terraform_source: cf-performance-tests-pipeline/base-infra/terraform
      put: base-infra
  system_domain: cf.p-((cloud_controller_type))((test_suffix)).((parent_zone_domain))
groups:
- jobs:
  - detect-new-versions
  - create-base-infra
  - deploy-director
  - run-perf-tests-postgres-15
  - run-perf-tests-postgres
  - run-perf-tests-mysql
  - teardown
  - set-next-pipeline
  name: test
- jobs:
  - manual-teardown-cf-only
  - manual-teardown-bbl-only
  - manual-teardown-base-infra-only
  - manual-teardown-all
  name: manual-teardown
jobs:
- name: detect-new-versions
  plan:
  - get: cf-performance-tests-pipeline
    trigger: true
  - get: cf-deployment
    trigger: true
  serial: true
- name: create-base-infra
  plan:
  - get: cf-performance-tests-pipeline
    passed:
    - detect-new-versions
    trigger: true
  - get: cf-deployment
    passed:
    - detect-new-versions
    trigger: true
  - attempts: 3
    params:
      terraform_source: cf-performance-tests-pipeline/base-infra/terraform
    put: base-infra
  serial: true
  serial_groups:
  - deploy-test-destroy
- name: deploy-director
  on_failure:
    params:
      alert_type: failed
    put: slack-notification
  plan:
  - in_parallel:
    - get: cf-performance-tests-pipeline
      passed:
      - create-base-infra
      trigger: true
    - get: cf-deployment
      passed:
      - create-base-infra
      trigger: true
    - get: cf-deployment-concourse-tasks
    - get: capi-ci
    - get: bbl-state
    - get: base-infra
  - file: base-infra/metadata
    format: json
    load_var: base-infra
  - ensure:
      attempts: 3
      params:
        rebase: true
        repository: updated-bbl-state
      put: bbl-state
    file: cf-deployment-concourse-tasks/bbl-up/task.yml
    input_mapping:
      bbl-config: cf-performance-tests-pipeline
      bbl-state: bbl-state
    params:
      BBL_AWS_ACCESS_KEY_ID: ((.:base-infra.bbl_aws_creds.aws_access_key_id))
      BBL_AWS_REGION: ((region))
      BBL_AWS_SECRET_ACCESS_KEY: ((.:base-infra.bbl_aws_creds.aws_secret_access_key))
      BBL_CONFIG_DIR: bbl-patches
      BBL_ENV_NAME: perf-test-((cloud_controller_type))((test_suffix))
      BBL_IAAS: aws
      BBL_LB_CERT: ((.:base-infra.cert_pem))
      BBL_LB_KEY: ((.:base-infra.private_key))
      BBL_STATE_DIR: perf-tests/bbl-state
      LB_DOMAIN: cf.p-((cloud_controller_type))((test_suffix)).((parent_zone_domain))
      SKIP_LB_CREATION: false
      TF_VAR_elb_idle_timeout: ((cf_router_idle_timeout_secs))
    task: bbl-up
  - attempts: 3
    file: capi-ci/ci/bbl-tasks/create_dns_record.yml
    input_mapping:
      bbl-state: updated-bbl-state
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
      DNS_DOMAIN: cf.p-((cloud_controller_type))((test_suffix)).((parent_zone_domain))
      GCP_DNS_SERVICE_ACCOUNT_KEY: ((capi-bbl-dns-service-account))
      GCP_PROJECT_ID: app-runtime-interfaces-wg
      SHARED_DNS_ZONE_NAME: app-runtime-interfaces
    task: create-dns-record
  serial: true
  serial_groups:
  - deploy-test-destroy
- name: run-perf-tests-postgres-15
  on_failure:
    params:
      alert_type: failed
    put: slack-notification
  plan:
  - in_parallel:
    - get: cf-performance-tests-pipeline
      passed:
      - deploy-director
      trigger: true
    - get: cf-deployment
      passed:
      - deploy-director
      trigger: true
    - get: cf-deployment-concourse-tasks
    - get: bbl-state
      passed:
      - deploy-director
    - get: base-infra
    - get: concourse-tasks
  - file: base-infra/metadata
    format: json
    load_var: base-infra
  - in_parallel:
    - attempts: 3
      file: concourse-tasks/combine-directories/task.yml
      input_mapping:
        src-1: cf-deployment
        src-2: cf-performance-tests-pipeline
      output_mapping:
        target: combined-ops-files
      params:
        SRC_1_GLOB: operations/*.yml
        SRC_2_GLOB: operations/*.yml
      task: combine-ops-file-directories
    - attempts: 3
      file: cf-performance-tests-pipeline/ci/tasks/write-bosh-vars-file/task.yml
      params:
        VARS:
          app_package_directory_key: ((.:base-infra.packages_bucket_name))
          aws_region: ((region))
          blobstore_access_key_id: ((.:base-infra.cloud_controller_aws_creds.aws_access_key_id))
          blobstore_secret_access_key: ((.:base-infra.cloud_controller_aws_creds.aws_secret_access_key))
          buildpack_directory_key: ((.:base-infra.buildpacks_bucket_name))
          droplet_directory_key: ((.:base-infra.droplets_bucket_name))
          resource_directory_key: ((.:base-infra.resources_bucket_name))
          test-suite-folder: ((test-suite-folder))
      task: write-bosh-vars-file
    - file: cf-performance-tests-pipeline/ci/tasks/get-artifact-versions/task.yml
      task: get-artifacts-versions
  - attempts: 3
    file: concourse-tasks/combine-directories/task.yml
    input_mapping:
      src-1: cf-vars-file
      src-2: cf-versions
    output_mapping:
      target: combined-vars-files
    task: combine-vars-file-directories
  - attempts: 3
    file: cf-deployment-concourse-tasks/bosh-deploy/task.yml
    input_mapping:
      ops-files: combined-ops-files
      vars-files: combined-vars-files
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
      BOSH_DEPLOY_ARGS: --var=results_folder=/tmp/results/rails/postgres15/results/
      MANIFEST_FILE: cf-deployment.yml
      OPS_FILES: operations/performance-tests-errand.yml operations/use-compiled-releases.yml
        operations/use-postgres.yml operations/use-postgres-15.yml((additional-ops-files))
        operations/scale-up-vms.yml operations/use-external-blobstore.yml operations/use-s3-blobstore.yml
        operations/log-db-queries.yml
      SYSTEM_DOMAIN: cf.p-((cloud_controller_type))((test_suffix)).((parent_zone_domain))
      VARS_FILES: cf-vars.yml cf_versions.yml
    task: deploy-cf
  - attempts: 3
    file: cf-deployment-concourse-tasks/bosh-cleanup/task.yml
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
    task: bosh-clean-up
  - attempts: 3
    file: cf-deployment-concourse-tasks/run-errand/task.yml
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
      DEPLOYMENT_NAME: cf
      ERRAND_NAME: cf-performance-tests-errand
      KEEP_ALIVE: true
    task: run-performance-tests
  - file: cf-versions/cf_versions.yml
    format: yaml
    load_var: cf-versions
  - attempts: 3
    file: cf-performance-tests-pipeline/ci/tasks/commit-test-results/task.yml
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
      GIT_COMMIT_EMAIL: ((ari-wg-gitbot-email))
      GIT_COMMIT_MESSAGE: Results for cf-deployment ((.:cf-versions.cf_deployment_version)),
        ((cloud_controller_type)) cc with postgres 15 ccdb
      GIT_COMMIT_USERNAME: ((ari-wg-gitbot-username))
    task: commit-test-results
  - params:
      rebase: true
      repository: cf-performance-tests-pipeline
    put: results
  - attempts: 3
    file: cf-deployment-concourse-tasks/bosh-delete-deployment/task.yml
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
      DELETE_ALL_DEPLOYMENTS: true
      IGNORE_ERRORS: true
    task: bosh-delete-deployments
  serial: true
  serial_groups:
  - deploy-test-destroy
- name: run-perf-tests-postgres
  on_failure:
