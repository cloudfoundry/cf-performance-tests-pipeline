- name: manual-teardown-cf-only
  plan:
  - in_parallel:
    - get: cf-deployment-concourse-tasks
    - get: bbl-state
  - attempts: 3
    file: cf-deployment-concourse-tasks/bosh-delete-deployment/task.yml
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
