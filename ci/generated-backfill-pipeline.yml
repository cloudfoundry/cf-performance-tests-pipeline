    params:
      BBL_STATE_DIR: perf-tests/bbl-state
      BOSH_DEPLOY_ARGS: --var=results_folder=/tmp/results/rails/postgres/results/
      MANIFEST_FILE: cf-deployment.yml
      OPS_FILES: operations/performance-tests-errand.yml operations/use-compiled-releases.yml
        operations/use-postgres.yml((additional-ops-files)) operations/scale-up-vms.yml
        operations/use-external-blobstore.yml operations/use-s3-blobstore.yml operations/log-db-queries.yml
      SYSTEM_DOMAIN: cf.p-((cloud_controller_type))((test_suffix)).((parent_zone_domain))
      VARS_FILES: cf-vars.yml cf_versions.yml
    task: deploy-cf
  - attempts: 3
    file: cf-deployment-concourse-tasks/bosh-cleanup/task.yml
    params:
      BBL_STATE_DIR: perf-tests/bbl-state
    task: bosh-clean-up
  - attempts: 3
